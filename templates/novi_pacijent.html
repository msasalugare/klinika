{% extends 'base.html' %}
{% block title %}Novi pacijent — Klinika{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-person-plus me-2"></i>Novi pacijent</h1>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">

        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">Ime <span class="text-danger">*</span></label>
          <input type="text" name="ime" class="form-control" required autofocus>
        </div>
        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">Prezime <span class="text-danger">*</span></label>
          <input type="text" name="prezime" class="form-control" required>
        </div>
        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">JMBG</label>
          <input type="text" name="jmbg" class="form-control font-monospace"
                 maxlength="13" pattern="[0-9]{13}" placeholder="13 cifara">
        </div>
        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">Datum rođenja</label>
          <input type="date" name="datum_rodjenja" class="form-control">
        </div>
        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">Pol</label>
          <select name="pol" class="form-select">
            <option value="">— izaberite —</option>
            <option value="M">Muški</option>
            <option value="Z">Ženski</option>
          </select>
        </div>
        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">Telefon</label>
          <input type="text" name="telefon" class="form-control">
        </div>
        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">Adresa</label>
          <input type="text" name="adresa" class="form-control">
        </div>
        <div class="col-sm-6 col-lg-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control">
        </div>

        <!-- Medicinska istorija -->
        <div class="col-12 mt-2">
          <div class="card border-warning">
            <div class="card-header py-2 bg-warning bg-opacity-10">
              <i class="bi bi-heart-pulse me-2 text-warning"></i>
              <span class="fw-semibold">Medicinska istorija</span>
              <span class="text-muted small ms-2">— koristi se za AI analizu interakcija</span>
            </div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-sm-4 col-lg-2">
                  <label class="form-label fw-semibold small">Krvna grupa</label>
                  <select name="krvna_grupa" class="form-select form-select-sm">
                    <option value="">— nepoznata —</option>
                    {% for kg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                    <option value="{{ kg }}">{{ kg }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-sm-4 col-lg-2 d-flex align-items-end">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="trudnoca" id="trudnoca">
                    <label class="form-check-label fw-semibold small" for="trudnoca">
                      Trudnoća <span class="text-danger">⚠️</span>
                    </label>
                  </div>
                </div>
                <div class="col-12 col-lg-8">
                  <label class="form-label fw-semibold small">Alergije na lekove</label>
                  <textarea name="alergije" class="form-control form-control-sm" rows="2"
                            placeholder="npr. penicilin, sulfonamidi, aspirin..."></textarea>
                </div>
                <div class="col-12 col-lg-4">
                  <label class="form-label fw-semibold small">Hronične bolesti</label>
                  <textarea name="hronicne_bolesti" class="form-control form-control-sm" rows="2"
                            placeholder="npr. dijabetes tip 2, hipertenzija..."></textarea>
                </div>
                <div class="col-12 col-lg-4">
                  <label class="form-label fw-semibold small">Kontraindikacije</label>
                  <textarea name="kontraindikacije" class="form-control form-control-sm" rows="2"
                            placeholder="npr. ne koristiti NSAID..."></textarea>
                </div>
                <div class="col-12 col-lg-4">
                  <label class="form-label fw-semibold small">Napomena / Anamneza</label>
                  <textarea name="napomena_anamneza" class="form-control form-control-sm" rows="2"
                            placeholder="Ostale relevantne medicinske napomene..."></textarea>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Dugmad pri dnu -->
        <div class="col-12 d-flex gap-2 pt-3 border-top mt-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>Sačuvaj pacijenta
          </button>
          <a href="{{ url_for('pacijenti') }}" class="btn btn-outline-secondary">Otkaži</a>
        </div>

      </div>
    </form>
  </div>
</div>
{% endblock %}
